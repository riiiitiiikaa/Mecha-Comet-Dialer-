  var recentsSearch = document.getElementById("recentsSearch");
  var contactsView = document.getElementById("contactsView");
  var contactsList = document.getElementById("contactsList");
  var contactsSearch = document.getElementById("contactsSearch");
  var addContactBtn = document.getElementById("addContactBtn");
  var contactForm = document.getElementById("contactForm");
  var contactFormTitle = document.getElementById("contactFormTitle");
  var cName = document.getElementById("cName");
  var cEmail = document.getElementById("cEmail");
  var numbersWrap = document.getElementById("numbersWrap");
  var formBodyEl = document.querySelector(".form-body");
  var formAv = document.getElementById("formAv");
  var formErr = document.getElementById("formErr");
  var editActions = document.getElementById("editActions");
  var contactDeleteBtn = document.getElementById("contactDeleteBtn");
  var contactBlockBtn = document.getElementById("contactBlockBtn");
  var numPad = document.getElementById("numPad");
  var npToggle = document.getElementById("npToggle");
  var numSymbols = false;
  var alphaKb = document.getElementById("alphaKb");
  var alphaDone = document.getElementById("alphaDone");
  var activeField = null;
  var shiftOn = false;
  var editingId = null;   // id of the contact being edited, or null for new
  var formReturnView = "contacts"; // view to return to when leaving the editor
  var currentView = "dialer";
  var navbar = document.getElementById("navbar");
  var navBackBtn = document.getElementById("navBackBtn");
  var navSaveBtn = document.getElementById("navSaveBtn");
  var navRecents = document.getElementById("navRecents");
  var navKeypad = document.getElementById("navKeypad");
  var navContacts = document.getElementById("navContacts");

  var simToggle = document.getElementById("simToggle");
  var simInfoBtn = document.getElementById("simInfoBtn");
  var simScreen = document.getElementById("simScreen");
  var simCards = document.getElementById("simCards");
  var simBackBtn = document.getElementById("simBackBtn");
  var callSim = document.getElementById("callSim");

  var sheetBackdrop = document.getElementById("sheetBackdrop");
  var sheet = document.getElementById("sheet");
  var sheetTitle = document.getElementById("sheetTitle");
  var sheetList = document.getElementById("sheetList");
  var sheetCancel = document.getElementById("sheetCancel");

  var callScreen = document.getElementById("callScreen");
  var callName = document.getElementById("callName");
  var callNumberSm = document.getElementById("callNumberSm");
  var callTimer = document.getElementById("callTimer");
  var callAvatar = document.getElementById("callAvatar");
  var endBtn = document.getElementById("endBtn");

  // Contacts book: array of { id, name, numbers: [digits...], def: index }, persisted locally.
  var contacts = loadContacts();
  ensureDemoContacts();

  // One-time: add sample contacts whose numbers start with 0123 (for testing search).
  function ensureDemoContacts() {
    try { if (localStorage.getItem("seed0123")) return; } catch (e) {}
    var demo = [
      { name: "Aisha Khan", numbers: ["01234567"] },
      { name: "Brian Cole", numbers: ["01238899"] },
      { name: "Carla Mendes", numbers: ["01234321"] },
      { name: "Deepak Rao", numbers: ["01237700"] },
      { name: "Elena Frost", numbers: ["01239045"] },
      { name: "Farhan Malik", numbers: ["01232211"] }
    ];
    for (var i = 0; i < demo.length; i++) {
      var exists = false;
      for (var j = 0; j < contacts.length; j++) {
        if (contacts[j].numbers.indexOf(demo[i].numbers[0]) !== -1) { exists = true; break; }
      }
      if (!exists) contacts.push({ id: newId(), name: demo[i].name, numbers: demo[i].numbers.slice(), def: 0 });
    }
    saveContacts();
    try { localStorage.setItem("seed0123", "1"); } catch (e) {}
  }

  function newId() {
    return "c" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  }

  function loadContacts() {
    var data = null;
    try {
      var raw = localStorage.getItem("dialerContacts");
      if (raw) data = JSON.parse(raw);
    } catch (e) {}

    if (Array.isArray(data)) return data;

    // Migrate the old { number: name } map format, if present.
    if (data && typeof data === "object") {
      var migrated = [];
      Object.keys(data).forEach(function (k) {
        migrated.push({ id: newId(), name: data[k], numbers: [k], def: 0 });
      });
      return migrated;
    }

    // First-run seed.
    return [
      { id: newId(), name: "Alex Rivera", numbers: ["5551234"], def: 0 },
      { id: newId(), name: "Pizza Palace", numbers: ["18005550199"], def: 0 },
      { id: newId(), name: "Emergency", numbers: ["911"], def: 0 }
    ];
  }

  function saveContacts() {
    try { localStorage.setItem("dialerContacts", JSON.stringify(contacts)); } catch (e) {}
  }

  function findContact(id) {
    for (var i = 0; i < contacts.length; i++) if (contacts[i].id === id) return contacts[i];
    return null;
  }

  function findContactByNumber(raw) {
    var key = (raw || "").replace(/\D/g, "");
    if (!key) return null;
    for (var i = 0; i < contacts.length; i++) {
      if (contacts[i].numbers.indexOf(key) !== -1) return contacts[i];
    }
    return null;
  }

  // ---------- Call-back flow: pick number, then pick SIM ----------
  var pendingCall = { number: "", name: "" };

  function openSheet() { sheetBackdrop.classList.add("active"); }
  function closeSheet() { sheetBackdrop.classList.remove("active"); }

  // Entry point when a call icon is tapped anywhere.
  function callFlow(tappedNumber, contactId) {
    var contact = contactId ? findContact(contactId) : findContactByNumber(tappedNumber);
    var nums = contact ? contact.numbers.slice() : [(tappedNumber || "").replace(/\D/g, "")];
    var name = contact ? contact.name : "";
    if (!nums[0]) return;
    if (nums.length > 1) showNumberPicker(name, nums, contact ? contact.def : 0);
    else beginSimStep(nums[0], name);
  }

  function showNumberPicker(name, numbers, defIdx) {
    pendingCall.name = name;
    sheetTitle.textContent = name ? "Call " + name : "Choose a number";
    var html = "";
    for (var i = 0; i < numbers.length; i++) {
      html +=
        '<button class="sheet-item" data-num="' + escapeHtml(numbers[i]) + '">' +
          '<span class="s-icon">' + phoneIcon + "</span>" +
          '<span class="s-main">' + escapeHtml(formatNumber(numbers[i])) + "</span>" +
          (i === defIdx ? '<span class="s-tag">Default</span>' : "") +
        "</button>";
    }
    sheetList.innerHTML = html;
    openSheet();
  }

  function beginSimStep(num, name) {
    pendingCall.number = num;
    pendingCall.name = name;
    var actives = [];
    for (var i = 0; i < sims.length; i++) if (sims[i].active) actives.push(i);
    if (actives.length <= 1) {
      placeCall(num, actives.length === 1 ? actives[0] : callSimIndex);
      return;
    }
    showSimPicker(num, name);
  }

  function showSimPicker(num, name) {
    sheetTitle.textContent = name ? "Call " + name + " via" : "Call via";
    var html = "";
    for (var i = 0; i < sims.length; i++) {
      if (!sims[i].active) continue;
      var s = sims[i];
      html +=
        '<button class="sheet-item" data-sim="' + i + '">' +
          '<span class="sim-dot" style="background:' + s.color + '"></span>' +
          '<span class="s-main">' + s.label +
            '<div class="s-sub">' + escapeHtml(s.carrier) + " · " + escapeHtml(formatNumber(num)) + "</div></span>" +
          (i === callSimIndex ? '<span class="s-tag">Default</span>' : "") +
        "</button>";
    }
    sheetList.innerHTML = html;
    openSheet();
  }

  function placeCall(num, simIndex) {
    closeSheet();
    number = num;
    if (typeof simIndex === "number") { callSimIndex = simIndex; renderSimToggle(); }
    render();
    startCall();
  }

  // ---------- Formatting ----------
  function formatNumber(raw) {
    var digits = raw.replace(/[^\d]/g, "");
    var hasSymbols = /[*#+]/.test(raw);
    if (hasSymbols || digits.length === 0) return raw;
    if (raw.length === 7) return raw.slice(0, 3) + "-" + raw.slice(3);
    if (raw.length === 10) return "(" + raw.slice(0, 3) + ") " + raw.slice(3, 6) + "-" + raw.slice(6);
    if (raw.length === 11 && raw[0] === "1") return "1 (" + raw.slice(1, 4) + ") " + raw.slice(4, 7) + "-" + raw.slice(7);
    return raw;
  }

  function lookupContact(raw) {
    var key = raw.replace(/[^\d]/g, "");
    if (!key) return "";
    for (var i = 0; i < contacts.length; i++) {
      if (contacts[i].numbers.indexOf(key) !== -1) return contacts[i].name;
    }
    return "";
  }

  // ---------- Search / T9 matching ----------
  var recentsQuery = "", contactsQuery = "";
  var T9 = { a:"2",b:"2",c:"2", d:"3",e:"3",f:"3", g:"4",h:"4",i:"4",
    j:"5",k:"5",l:"5", m:"6",n:"6",o:"6", p:"7",q:"7",r:"7",s:"7",
    t:"8",u:"8",v:"8", w:"9",x:"9",y:"9",z:"9" };

  function wordToDigits(w) {
    var out = "";
    for (var i = 0; i < w.length; i++) { var c = w.charAt(i).toLowerCase(); if (T9[c]) out += T9[c]; }
    return out;
  }
  // Name matches a typed digit sequence via T9 (prefix of the name or any word).
  function t9Match(name, digits) {
    if (!name || !digits) return false;
    if (wordToDigits(name).indexOf(digits) === 0) return true;
    var words = name.split(/\s+/);
    for (var i = 0; i < words.length; i++) {
      if (wordToDigits(words[i]).indexOf(digits) === 0) return true;
    }
    return false;
  }
  // Generic match: query can be a name (letters) or a number / T9 (digits).
  function matchEntry(name, number, q) {
    if (!q) return true;
    var ql = q.toLowerCase().trim();
    if (name && name.toLowerCase().indexOf(ql) !== -1) return true;
    var qd = q.replace(/\D/g, "");
    if (qd) {
      if (number && number.replace(/\D/g, "").indexOf(qd) !== -1) return true;
      if (t9Match(name, qd)) return true;
    }
    return false;
  }
  function matchContact(c, q) {
    if (!q) return true;
    for (var i = 0; i < c.numbers.length; i++) if (matchEntry(c.name, c.numbers[i], q)) return true;
    return matchEntry(c.name, "", q);
  }

  // ---------- Keypad suggestions ----------
  var lastSugScroll = 0;

  function renderSuggestions() {
    var digits = number.replace(/\D/g, "");
    var hasSym = /[*#+]/.test(number);
    if (inCall || !digits || hasSym) { hideSuggestions(); return; }

    var seen = {}, items = [], i, j;
    for (i = 0; i < contacts.length; i++) {
      var c = contacts[i];
      for (j = 0; j < c.numbers.length; j++) {
        var nu = c.numbers[j];
        if (nu === digits) continue;
        if (nu.indexOf(digits) !== -1 || t9Match(c.name, digits)) {
          var key = c.name + "|" + nu;
          if (!seen[key]) { seen[key] = 1; items.push({ name: c.name, number: nu }); }
        }
      }
    }
    for (i = 0; i < callLog.length; i++) {
      var en = callLog[i].number.replace(/\D/g, "");
      if (!en || en === digits || lookupContact(en)) continue;
      if (en.indexOf(digits) !== -1) {
        var k2 = "r|" + en;
        if (!seen[k2]) { seen[k2] = 1; items.push({ name: callLog[i].name || "", number: en }); }
      }
    }
    items = items.slice(0, 20);
    if (items.length === 0) { hideSuggestions(); return; }

    var html = "";
    for (i = 0; i < items.length; i++) {
      var it = items[i];
      var disp = it.name || formatNumber(it.number);
      var av = it.name ? it.name.charAt(0).toUpperCase() : "#";
      html +=
        '<div class="log-row" data-call="' + escapeHtml(it.number) + '">' +
          '<span class="contact-av">' + escapeHtml(av) + "</span>" +
          '<div class="log-info">' +
            '<div class="log-name">' + escapeHtml(disp) + "</div>" +
            (it.name ? '<div class="log-meta">' + escapeHtml(formatNumber(it.number)) + "</div>" : "") +
          "</div>" +
          '<button class="log-call" data-call="' + escapeHtml(it.number) + '" aria-label="Call">' + phoneIcon + "</button>" +
        "</div>";
    }
    suggestions.innerHTML = html;
    suggestions.scrollTop = 0;
    lastSugScroll = 0;
    dialerView.classList.add("dialer-suggesting");
    dialerView.classList.remove("keypad-min");
  }

  function hideSuggestions() {
    dialerView.classList.remove("dialer-suggesting", "keypad-min");
    suggestions.innerHTML = "";
  }

  function render() {
    if (number.length === 0) {
      numberEl.textContent = "Enter a number";
      numberEl.classList.add("placeholder");
      contactNameEl.textContent = "";
      deleteBtn.classList.add("hidden");
      subStatusEl.textContent = "";
    } else {
      numberEl.textContent = formatNumber(number);
      numberEl.classList.remove("placeholder");
      contactNameEl.textContent = lookupContact(number);
      deleteBtn.classList.remove("hidden");
      var len = numberEl.textContent.length;
      numberEl.style.fontSize = len > 16 ? "28px" : len > 12 ? "36px" : "46px";
    }
    renderSuggestions();
  }

  // ---------- Input ----------
  function pressKey(k) {
    if (inCall) {
      flashStatus("Tone: " + k);
      beep(k);
      return;
    }
    if (number.length >= 18) return;
    number += k;
    beep(k);
    render();
  }

  function deleteOne() {
    number = number.slice(0, -1);
    render();
  }

  function clearAll() {
    number = "";
    render();
  }

  var statusTimeout = null;
  function flashStatus(msg) {
    subStatusEl.textContent = msg;
    clearTimeout(statusTimeout);
    statusTimeout = setTimeout(function () {
      if (!inCall) subStatusEl.textContent = "";
    }, 900);
  }

  // ---------- Calls ----------
  function startCall() {
    if (number.length === 0) {
      flashStatus("Enter a number first");
      return;
    }
    inCall = true;
    callConnected = false;
    seconds = 0;

    var name = lookupContact(number) || "Unknown";
    callName.textContent = name;
    callNumberSm.textContent = formatNumber(number);
    callAvatar.textContent = name === "Unknown" ? "?" : name.charAt(0).toUpperCase();
    callTimer.textContent = "Calling…";
    normalizeCallSim();
    var sim = sims[callSimIndex];
    callSim.innerHTML = sim
      ? '<span class="sim-dot" style="background:' + sim.color + '"></span>via ' +
        sim.label + " · " + escapeHtml(sim.carrier)
      : "";
    callBtn.classList.add("in-call");
    callScreen.classList.add("active");
    addToLog(number, lookupContact(number), "outgoing", callSimIndex);

    connectTimeout = setTimeout(function () {
      callConnected = true;
      callTimer.textContent = "00:00";
      timerInterval = setInterval(tick, 1000);
    }, 2200);
  }

  function tick() {
    seconds += 1;
    var m = Math.floor(seconds / 60);
    var s = seconds % 60;
    callTimer.textContent = (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
  }

  function endCall() {
    inCall = false;
    callConnected = false;
    clearTimeout(connectTimeout);
    clearInterval(timerInterval);
    timerInterval = null;
    callScreen.classList.remove("active");
    callBtn.classList.remove("in-call");
    subStatusEl.textContent = "";
  }

  // ---------- Sound (Web Audio DTMF) ----------
  var audioCtx = null;
  var dtmf = {
    "1": [697, 1209], "2": [697, 1336], "3": [697, 1477],
    "4": [770, 1209], "5": [770, 1336], "6": [770, 1477],
    "7": [852, 1209], "8": [852, 1336], "9": [852, 1477],
    "*": [941, 1209], "0": [941, 1336], "#": [941, 1477]
  };
  function beep(k) {
    try {
      if (!audioCtx) {
        var AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        audioCtx = new AC();
      }
      if (audioCtx.state === "suspended") audioCtx.resume();
      var pair = dtmf[k];
      if (!pair) return;
      var gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.18);
      gain.connect(audioCtx.destination);
      pair.forEach(function (freq) {
        var osc = audioCtx.createOscillator();
        osc.type = "sine";
        osc.frequency.value = freq;
        osc.connect(gain);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.18);
      });
    } catch (e) {}
  }

  // ---------- Dual SIM ----------
  var sims = [
    { label: "SIM 1", carrier: "Airtel", number: "+91 98765 43210",
      color: "#f5c518", bars: 4, net: "5G", roaming: false, active: true },
    { label: "SIM 2", carrier: "Jio", number: "+91 87654 32109",
      color: "#2f8fff", bars: 3, net: "4G LTE", roaming: false, active: true }
  ];
  var callSimIndex = 0; // which SIM outgoing calls use

  function activeSims() {
    return sims.filter(function (s) { return s.active; });
  }

  function normalizeCallSim() {
    if (!sims[callSimIndex] || !sims[callSimIndex].active) {
      for (var i = 0; i < sims.length; i++) {
        if (sims[i].active) { callSimIndex = i; return; }
      }
    }
  }

  function sigBars(bars, color) {
    var s = '<span class="sig" style="color:' + color + '">';
    for (var i = 1; i <= 4; i++) s += '<i class="' + (i <= bars ? "on" : "") + '"></i>';
    return s + "</span>";
  }

  // Compact toggle button on the dialer (top-right), showing the active SIM.
  function renderSimToggle() {
    normalizeCallSim();
    var actives = [];
    for (var i = 0; i < sims.length; i++) if (sims[i].active) actives.push(i);

    if (actives.length === 0) {
      simToggle.style.display = "none";
      return;
    }
    simToggle.style.display = "flex";
    var s = sims[callSimIndex];
    simToggle.textContent = "S" + (callSimIndex + 1);
    simToggle.style.color = s.color;
    simToggle.style.borderColor = s.color;
    simToggle.title = "SIM " + (callSimIndex + 1) + " · " + s.carrier +
      (actives.length > 1 ? " — tap to switch" : "");
  }

  // Cycle to the next active SIM.
  function cycleSim() {
    var actives = [];
    for (var i = 0; i < sims.length; i++) if (sims[i].active) actives.push(i);
    if (actives.length < 2) return;
    var pos = actives.indexOf(callSimIndex);
    callSimIndex = actives[(pos + 1) % actives.length];
    renderSimToggle();
  }

  // Full SIM information page.
  function renderSimScreen() {
    var html = "";
    for (var i = 0; i < sims.length; i++) {
      var s = sims[i];
      var isDefault = i === callSimIndex && s.active;
      html +=
        '<div class="sim-card s' + (i + 1) + (s.active ? "" : " off") + '">' +
          '<div class="sim-card-head">' +
            '<div class="sim-card-title">' +
              '<span class="sim-dot" style="background:' + s.color + '"></span>' +
              "<div><div class=\"t\">" + s.label + "</div>" +
              '<div class="c">' + escapeHtml(s.carrier) + "</div></div>" +
            "</div>" +
            (isDefault ? '<span class="badge default">Default for calls</span>' :
              (s.active ? '<span class="badge">Active</span>' : '<span class="badge">Off</span>')) +
          "</div>" +
          '<div class="sim-num">' + escapeHtml(s.number) + "</div>" +
          '<div class="sim-rows">' +
            '<div class="sim-row"><span class="k">Signal</span><span class="v">' +
              (s.active ? sigBars(s.bars, s.color) + "<span>" + s.bars + "/4</span>" : "<span>—</span>") +
            "</span></div>" +
            '<div class="sim-row"><span class="k">Network</span><span class="v">' +
              (s.active ? escapeHtml(s.net) : "No service") + "</span></div>" +
            '<div class="sim-row"><span class="k">Data roaming</span><span class="v">' +
              '<span class="badge ' + (s.roaming ? "roam-on" : "") + '">' + (s.roaming ? "On" : "Off") + "</span></span></div>" +
            '<div class="sim-row"><span class="k">Number</span><span class="v">' + escapeHtml(s.number) + "</span></div>" +
          "</div>" +
          '<div class="sim-card-actions">' +
            '<label class="sim-toggle-wrap">' +
              '<span class="switch"><input type="checkbox" data-toggle="' + i + '"' + (s.active ? " checked" : "") + ">" +
              '<span class="track"></span><span class="knob"></span></span>' +
              "<span>" + (s.active ? "Enabled" : "Disabled") + "</span>" +
            "</label>" +
            '<button class="set-default-btn" data-default="' + i + '"' +
              (isDefault || !s.active ? " disabled" : "") + ">" +
              (isDefault ? "Default" : "Set as default") +
            "</button>" +
          "</div>" +
        "</div>";
    }
    simCards.innerHTML = html;
  }

  function toggleSim(i) {
    // Keep at least one SIM active.
    if (sims[i].active && activeSims().length === 1) {
      flashStatus("At least one SIM must stay active");
      renderSimScreen();
      return;
    }
    sims[i].active = !sims[i].active;
    normalizeCallSim();
    renderSimScreen();
    renderSimToggle();
  }

  function setDefaultSim(i) {
    if (sims[i].active) {
      callSimIndex = i;
      renderSimScreen();
      renderSimToggle();
    }
  }

  function openSimScreen() { renderSimScreen(); simScreen.classList.add("active"); }
  function closeSimScreen() { simScreen.classList.remove("active"); }

  // ---------- Call log / Recents ----------
  var callLog = loadLog();

  function loadLog() {
    try {
      var raw = localStorage.getItem("dialerCallLog");
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    // Seed with sample history on first run.
    var now = Date.now();
    return [
      { number: "5551234", name: "Alex Rivera", type: "incoming", ts: now - 25 * 60000, sim: 0 },
      { number: "18005550199", name: "Pizza Palace", type: "outgoing", ts: now - 3 * 3600000, sim: 1 },
      { number: "5559876", name: "", type: "missed", ts: now - 26 * 3600000, sim: 0 },
      { number: "5552020", name: "", type: "outgoing", ts: now - 50 * 3600000, sim: 1 },
      { number: "911", name: "Emergency", type: "outgoing", ts: now - 5 * 86400000, sim: 0 }
    ];
  }

  function saveLog() {
    try { localStorage.setItem("dialerCallLog", JSON.stringify(callLog.slice(0, 50))); } catch (e) {}
  }

  function addToLog(num, name, type, sim) {
    callLog.unshift({ number: num, name: name || "", type: type, ts: Date.now(),
      sim: typeof sim === "number" ? sim : callSimIndex });
    callLog = callLog.slice(0, 50);
    saveLog();
  }

  function relTime(ts) {
    var d = new Date(ts), now = new Date();
    var time = d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    var yest = new Date(now); yest.setDate(now.getDate() - 1);
    if (d.toDateString() === now.toDateString()) return time;
    if (d.toDateString() === yest.toDateString()) return "Yesterday";
    return d.toLocaleDateString([], { month: "short", day: "numeric" });
  }

  var typeIcons = {
    outgoing: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="8 7 17 7 17 16"></polyline></svg>',
    incoming: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="17" y1="7" x2="7" y2="17"></line><polyline points="16 17 7 17 7 8"></polyline></svg>',
    missed: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="17" y1="7" x2="7" y2="17"></line><polyline points="16 17 7 17 7 8"></polyline></svg>'
  };
  var phoneIcon = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.2 1l-2.3 2.2z"></path></svg>';

  function typeLabel(t) {
    return t === "outgoing" ? "Outgoing" : t === "incoming" ? "Incoming" : "Missed";
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function renderRecents() {
    if (callLog.length === 0) {
      recentsList.innerHTML = '<div class="recents-empty">No recent calls</div>';
      return;
    }
    var q = recentsQuery, html = "", shown = 0;
    for (var i = 0; i < callLog.length; i++) {
      var e = callLog[i];
      var display = e.name || lookupContact(e.number) || formatNumber(e.number);
      if (!matchEntry(e.name || lookupContact(e.number), e.number, q)) continue;
      shown++;
      var missed = e.type === "missed";
      var sim = sims[e.sim] || sims[0];
      var simTag = '<span class="log-sim" style="color:' + sim.color + '">' + sim.label + "</span>";
      html +=
        '<div class="log-row" data-num="' + escapeHtml(e.number) + '">' +
          '<span class="log-type ' + e.type + '">' + typeIcons[e.type] + '</span>' +
          '<div class="log-info">' +
            '<div class="log-name' + (missed ? " missed" : "") + '">' + escapeHtml(display) + '</div>' +
            '<div class="log-meta">' + typeLabel(e.type) + ' · ' + relTime(e.ts) + simTag + '</div>' +
          '</div>' +
          '<button class="log-call" data-call="' + escapeHtml(e.number) + '" aria-label="Call">' + phoneIcon + '</button>' +
        '</div>';
    }
    if (shown === 0) html = '<div class="recents-empty">No matches</div>';
    recentsList.innerHTML = html;
  }

  function renderContacts() {
    if (contacts.length === 0) {
      contactsList.innerHTML = '<div class="recents-empty">No contacts</div>';
      return;
    }
    var sorted = contacts.slice().sort(function (a, b) { return a.name.localeCompare(b.name); });
    var q = contactsQuery, html = "", shown = 0;
    for (var i = 0; i < sorted.length; i++) {
      var c = sorted[i];
      if (!matchContact(c, q)) continue;
      shown++;
      var num = c.numbers[c.def] || c.numbers[0] || "";
      var extra = c.numbers.length > 1 ? '<span class="num-count">+' + (c.numbers.length - 1) + "</span>" : "";
      var blockedTag = c.blocked ? '<span class="blocked-tag">Blocked</span>' : "";
      html +=
        '<div class="log-row" data-id="' + escapeHtml(c.id) + '">' +
          '<span class="contact-av">' + escapeHtml((c.name || "?").charAt(0).toUpperCase()) + "</span>" +
          '<div class="log-info">' +
            '<div class="log-name">' + escapeHtml(c.name) + blockedTag + "</div>" +
            '<div class="log-meta">' + escapeHtml(formatNumber(num)) + extra + "</div>" +
          "</div>" +
          '<button class="log-call" data-call="' + escapeHtml(num) + '" aria-label="Call">' + phoneIcon + "</button>" +
        "</div>";
    }
    if (shown === 0) html = '<div class="recents-empty">No matches</div>';
    contactsList.innerHTML = html;
  }

  // ---------- Add / edit contact ----------
  function updateFormAvatar() {
    var n = cName.value.trim();
    formAv.textContent = n ? n.charAt(0).toUpperCase() : "?";
  }

  var minusIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="12" x2="18" y2="12"></line></svg>';
  var plusIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="6" x2="12" y2="18"></line><line x1="6" y1="12" x2="18" y2="12"></line></svg>';

  // Build a number row. Existing numbers get a red minus (remove); the trailing
  // "add" row is an empty input with a blue plus (commit + start another).
  function buildNumRow(value, isAdd) {
    return '<div class="num-row' + (isAdd ? " add-row" : "") + '">' +
        '<input class="num-input" type="tel" placeholder="Phone number" autocomplete="off" maxlength="20" value="' + escapeHtml(value) + '">' +
        '<button type="button" class="num-act ' + (isAdd ? "add" : "remove") + '" aria-label="' +
          (isAdd ? "Add number" : "Remove number") + '">' + (isAdd ? plusIcon : minusIcon) + "</button>" +
      "</div>";
  }

  function renderNumberRows(numbers) {
    var html = "";
    for (var i = 0; i < numbers.length; i++) {
      if (numbers[i]) html += buildNumRow(formatNumber(numbers[i]), false);
    }
    html += buildNumRow("", true); // trailing add row
    numbersWrap.innerHTML = html;
  }

  // All input values (committed rows + the add row), digits only.
  function readNumberRows() {
    var inputs = numbersWrap.querySelectorAll(".num-input");
    var vals = [];
    for (var i = 0; i < inputs.length; i++) vals.push(inputs[i].value.replace(/\D/g, ""));
    return vals;
  }

  function openContactForm(prefillNumber) {
    editingId = null;
    formReturnView = currentView;
    cName.value = "";
    cEmail.value = "";
    formErr.textContent = "";
    contactFormTitle.textContent = "New Contact";
    editActions.style.display = "none";   // no block/delete for a new contact
    renderNumberRows(prefillNumber ? [prefillNumber.replace(/\D/g, "")] : []);
    updateFormAvatar();
    hideBoards();
    renderNumKeys(false);
    contactForm.classList.add("active");
    navbar.classList.add("editing");
  }

  function openContactEditor(id) {
    var c = findContact(id);
    if (!c) return;
    editingId = id;
    formReturnView = currentView;
    cName.value = c.name || "";
    cEmail.value = c.email || "";
    formErr.textContent = "";
    contactFormTitle.textContent = "Edit Contact";
    editActions.style.display = "flex";
    updateBlockBtn(!!c.blocked);
    renderNumberRows(c.numbers.slice());
    updateFormAvatar();
    hideBoards();
    renderNumKeys(false);
    contactForm.classList.add("active");
    navbar.classList.add("editing");
  }

  function updateBlockBtn(blocked) {
    contactBlockBtn.textContent = blocked ? "Unblock" : "Block";
    contactBlockBtn.classList.toggle("on", blocked);
  }

  function blockContact() {
    if (!editingId) return;
    var c = findContact(editingId);
    if (!c) return;
    c.blocked = !c.blocked;
    saveContacts();
    updateBlockBtn(c.blocked);
    flashStatus(c.blocked ? "Contact blocked" : "Contact unblocked");
  }

  function closeContactForm() {
    contactForm.classList.remove("active");
    navbar.classList.remove("editing");
    hideBoards();
  }

  // ---------- On-screen keypad / keyboard ----------
  // Switch the numeric keypad between digits and the +*# symbols layout.
  function renderNumKeys(symbols) {
    numSymbols = symbols;
    npToggle.textContent = symbols ? "123" : "+*#";
    var keys = numPad.querySelectorAll(".np-key");
    for (var i = 0; i < keys.length; i++) {
      var btn = keys[i];
      if (btn.classList.contains("np-toggle") || btn.classList.contains("back")) continue;
      if (symbols) {
        var sym = btn.getAttribute("data-sym") || "";
        btn.textContent = sym;
        btn.classList.toggle("np-blank", !sym);
      } else {
        btn.textContent = btn.getAttribute("data-k");
        btn.classList.remove("np-blank");
      }
    }
  }

  function showNumPad() { hideAlphaKb(); numPad.classList.add("show"); formBodyEl.classList.add("board-open"); }
  function hideNumPad() { numPad.classList.remove("show"); }
  function showAlphaKb() { hideNumPad(); alphaKb.classList.add("show"); formBodyEl.classList.add("board-open"); }
  function hideAlphaKb() { alphaKb.classList.remove("show"); }
  function hideBoards() { hideNumPad(); hideAlphaKb(); if (formBodyEl) formBodyEl.classList.remove("board-open"); }

  // Scroll the focused field up so it sits just above the open board.
  function ensureFieldVisible() {
    if (!activeField) return;
    var board = numPad.classList.contains("show") ? numPad
      : (alphaKb.classList.contains("show") ? alphaKb : null);
    if (!board) return;
    var boardTop = board.getBoundingClientRect().top;
    var r = activeField.getBoundingClientRect();
    var overlap = r.bottom - (boardTop - 16);
    if (overlap > 0) formBodyEl.scrollTop += overlap;
  }

  function fieldInsert(text) {
    var input = activeField;
    if (!input) return;
    var s = input.selectionStart, e = input.selectionEnd;
    if (s == null) { s = e = input.value.length; }
    var v = input.value;
    input.value = v.slice(0, s) + text + v.slice(e);
    var pos = s + text.length;
    input.setSelectionRange(pos, pos);
    if (input === cName) updateFormAvatar();
  }

  function fieldBackspace() {
    var input = activeField;
    if (!input) return;
    var s = input.selectionStart, e = input.selectionEnd;
    var v = input.value;
    if (s == null) { input.value = v.slice(0, -1); }
    else if (s !== e) { input.value = v.slice(0, s) + v.slice(e); input.setSelectionRange(s, s); }
    else if (s > 0) { input.value = v.slice(0, s - 1) + v.slice(s); input.setSelectionRange(s - 1, s - 1); }
    if (input === cName) updateFormAvatar();
  }

  // Shift key: toggle case of the alpha keys, auto-off after a letter.
  function setShift(on) {
    shiftOn = on;
    var shiftKey = alphaKb.querySelector(".kb-key.shift");
    if (shiftKey) shiftKey.classList.toggle("on", on);
    var keys = alphaKb.querySelectorAll(".kb-key[data-k]");
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i].getAttribute("data-k");
      if (k.length === 1 && k >= "a" && k <= "z") keys[i].textContent = on ? k.toUpperCase() : k;
    }
  }

  function cancelContactForm() {
    closeContactForm();
    showView(formReturnView || "contacts");
  }

  function saveContact() {
    var name = cName.value.trim();
    var email = cEmail.value.trim();
    var raw = readNumberRows();
    var nums = [];
    for (var i = 0; i < raw.length; i++) {
      if (raw[i].length >= 3 && nums.indexOf(raw[i]) === -1) nums.push(raw[i]);
    }
    if (!name) { formErr.textContent = "Enter a name"; return; }
    if (nums.length === 0) { formErr.textContent = "Enter at least one valid number"; return; }

    if (editingId) {
      var c = findContact(editingId);
      // Keep the previous default if that number still exists, else first.
      var prevDefault = c ? c.numbers[c.def] : null;
      var def = prevDefault ? nums.indexOf(prevDefault) : 0;
      if (def < 0) def = 0;
      if (c) { c.name = name; c.numbers = nums; c.def = def; c.email = email; }
    } else {
      contacts.push({ id: newId(), name: name, numbers: nums, def: 0, email: email });
    }
    saveContacts();
    var wasEdit = !!editingId;
    closeContactForm();
    showView("contacts");
    flashStatus(wasEdit ? "Contact updated" : "Contact saved");
  }

  function deleteContact() {
    if (editingId && findContact(editingId)) {
      contacts = contacts.filter(function (c) { return c.id !== editingId; });
      saveContacts();
      closeContactForm();
      showView("contacts");
      flashStatus("Contact deleted");
    } else {
      cancelContactForm();
    }
  }

  function showView(name) {
    // Close any open overlay so the bottom nav always navigates.
    closeSimScreen();
    closeContactForm();
    var isRecents = name === "recents";
    var isContacts = name === "contacts";
    var isDialer = !isRecents && !isContacts;
    currentView = isDialer ? "dialer" : name;
    dialerView.classList.toggle("hidden-view", !isDialer);
    recentsView.classList.toggle("hidden-view", !isRecents);
    contactsView.classList.toggle("hidden-view", !isContacts);
    navKeypad.classList.toggle("active", isDialer);
    navRecents.classList.toggle("active", isRecents);
    navContacts.classList.toggle("active", isContacts);
    if (isRecents) renderRecents();
    if (isContacts) renderContacts();
  }

  // ---------- Wiring ----------
  keypad.addEventListener("click", function (e) {
    var btn = e.target.closest(".key");
    if (!btn) return;
    pressKey(btn.getAttribute("data-key"));
  });

  // Long-press 0 => "+"
  var zeroBtn = keypad.querySelector('[data-key="0"]');
  var holdTimer = null;
  zeroBtn.addEventListener("mousedown", function () {
    holdTimer = setTimeout(function () {
      if (!inCall && number.slice(-1) === "0") {
        number = number.slice(0, -1) + "+";
        render();
      }
    }, 500);
  });
  ["mouseup", "mouseleave"].forEach(function (ev) {
    zeroBtn.addEventListener(ev, function () { clearTimeout(holdTimer); });
  });

  callBtn.addEventListener("click", startCall);
  endBtn.addEventListener("click", endCall);

  // SIM toggle + info page
  simToggle.addEventListener("click", cycleSim);
  simInfoBtn.addEventListener("click", openSimScreen);
  simBackBtn.addEventListener("click", closeSimScreen);
  simCards.addEventListener("click", function (e) {
    var toggle = e.target.closest("[data-toggle]");
    if (toggle) { toggleSim(parseInt(toggle.getAttribute("data-toggle"), 10)); return; }
    var def = e.target.closest("[data-default]");
    if (def && !def.disabled) setDefaultSim(parseInt(def.getAttribute("data-default"), 10));
  });

  // Bottom-nav view switching
  navRecents.addEventListener("click", function () { showView("recents"); });
  navKeypad.addEventListener("click", function () { showView("dialer"); });
  navContacts.addEventListener("click", function () { showView("contacts"); });

  // Shared list handler: tap a row to load the number, tap the green icon to call back.
  function handleListTap(e) {
    var callBtnEl = e.target.closest(".log-call");
    if (callBtnEl) {
      e.stopPropagation();
      callFlow(callBtnEl.getAttribute("data-call"), null);
      return;
    }
    var row = e.target.closest(".log-row");
    if (row) {
      number = row.getAttribute("data-num");
      showView("dialer");
      render();
    }
  }
  recentsList.addEventListener("click", handleListTap);

  // Contacts: green icon starts the call-back flow, tapping the row opens the editor.
  contactsList.addEventListener("click", function (e) {
    var callBtnEl = e.target.closest(".log-call");
    if (callBtnEl) {
      e.stopPropagation();
      var idRow = e.target.closest(".log-row");
      callFlow(callBtnEl.getAttribute("data-call"), idRow ? idRow.getAttribute("data-id") : null);
      return;
    }
    var row = e.target.closest(".log-row");
    if (row) openContactEditor(row.getAttribute("data-id"));
  });

  // Search boxes (Recents / Contacts).
  recentsSearch.addEventListener("input", function () { recentsQuery = this.value; renderRecents(); });
  contactsSearch.addEventListener("input", function () { contactsQuery = this.value; renderContacts(); });

  // Scroll direction through suggestions drives the keypad: down collapses, up expands.
  function setKeypadMin(on) { dialerView.classList.toggle("keypad-min", on); }

  suggestions.addEventListener("wheel", function (e) {
    if (e.deltaY > 4) setKeypadMin(true);
    else if (e.deltaY < -4) setKeypadMin(false);
  }, { passive: true });

  var touchStartY = null;
  suggestions.addEventListener("touchstart", function (e) {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  suggestions.addEventListener("touchmove", function (e) {
    if (touchStartY == null) return;
    var dy = e.touches[0].clientY - touchStartY;
    if (dy < -8) setKeypadMin(true);        // dragging up → browsing down → collapse
    else if (dy > 8) setKeypadMin(false);   // dragging down → scrolling up → expand
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  // Reaching the very top of the list always shows the full keypad.
  suggestions.addEventListener("scroll", function () {
    if (suggestions.scrollTop <= 2) setKeypadMin(false);
  });

  // Tapping the bar expands the keypad back up.
  keypadBar.addEventListener("click", function () {
    setKeypadMin(false);
    suggestions.scrollTop = 0;
  });
  suggestions.addEventListener("click", function (e) {
    var callEl = e.target.closest(".log-call");
    if (callEl) { callFlow(callEl.getAttribute("data-call"), null); return; }
    var row = e.target.closest(".log-row");
    if (row) { number = row.getAttribute("data-call"); render(); }
  });

  // Picker sheet: choose a number, then a SIM.
  sheetList.addEventListener("click", function (e) {
    var numEl = e.target.closest("[data-num]");
    if (numEl) { beginSimStep(numEl.getAttribute("data-num"), pendingCall.name); return; }
    var simEl = e.target.closest("[data-sim]");
    if (simEl) { placeCall(pendingCall.number, parseInt(simEl.getAttribute("data-sim"), 10)); }
  });
  sheetCancel.addEventListener("click", closeSheet);
  sheetBackdrop.addEventListener("click", function (e) {
    if (e.target === sheetBackdrop) closeSheet();
  });

  // Number rows: red minus removes a row; blue plus commits the add row and opens a fresh one.
  numbersWrap.addEventListener("click", function (e) {
    var add = e.target.closest(".num-act.add");
    if (add) {
      var addRow = add.closest(".num-row");
      var addInput = addRow.querySelector(".num-input");
      var digits = addInput.value.replace(/\D/g, "");
      if (digits.length < 3) { addInput.focus(); return; }
      var temp = document.createElement("div");
      temp.innerHTML = buildNumRow(formatNumber(digits), false);
      numbersWrap.insertBefore(temp.firstChild, addRow);
      addInput.value = "";
      addInput.focus();
      return;
    }
    var rem = e.target.closest(".num-act.remove");
    if (rem) rem.closest(".num-row").remove();
  });

  // Dialer "add contact" button → opens the form, prefilled with the dialed number.
  addBtn.addEventListener("click", function () {
    openContactForm(number);
  });

  // Contacts tab "+" button → opens a blank form.
  addContactBtn.addEventListener("click", function () { openContactForm(""); });
  contactDeleteBtn.addEventListener("click", deleteContact);
  contactBlockBtn.addEventListener("click", blockContact);
  cName.addEventListener("input", updateFormAvatar);

  // Editor bottom nav: back cancels, tick saves.
  navBackBtn.addEventListener("click", cancelContactForm);
  navSaveBtn.addEventListener("click", saveContact);

  // Show the matching board for the focused field: keypad for numbers, keyboard for name.
  contactForm.addEventListener("focusin", function (e) {
    var t = e.target;
    if (t.classList && t.classList.contains("num-input")) {
      activeField = t;
      showNumPad();
      setTimeout(ensureFieldVisible, 220);
    } else if (t === cName) {
      activeField = t;
      setShift(!cName.value);   // capitalize the first letter of an empty name
      showAlphaKb();
      setTimeout(ensureFieldVisible, 220);
    } else if (t === cEmail) {
      activeField = t;
      setShift(false);          // emails are lowercase by default
      showAlphaKb();
      setTimeout(ensureFieldVisible, 220);
    } else {
      hideBoards();
    }
  });

  // Dismiss the board when tapping outside a field/board, or swiping the form.
  function dismissBoards() {
    if (!numPad.classList.contains("show") && !alphaKb.classList.contains("show")) return;
    hideBoards();
    if (activeField) { activeField.blur(); activeField = null; }
  }
  contactForm.addEventListener("mousedown", function (e) {
    if (e.target === cName || e.target === cEmail) return;
    if (e.target.closest("#numbersWrap") || e.target.closest("#numPad") || e.target.closest("#alphaKb")) return;
    dismissBoards();
  });
  formBodyEl.addEventListener("touchmove", dismissBoards, { passive: true });
  formBodyEl.addEventListener("wheel", dismissBoards, { passive: true });

  // Show the scrollbar only while actively scrolling, then fade it out.
  var scrollHideTimer = null;
  formBodyEl.addEventListener("scroll", function () {
    formBodyEl.classList.add("scrolling");
    clearTimeout(scrollHideTimer);
    scrollHideTimer = setTimeout(function () { formBodyEl.classList.remove("scrolling"); }, 700);
  }, { passive: true });


  // Keys act on pointer-down and preventDefault so the field keeps focus/caret.
  function onNumPadPress(e) {
    var key = e.target.closest(".np-key");
    if (!key) return;
    e.preventDefault();
    if (key.classList.contains("np-toggle")) {
      renderNumKeys(!numSymbols);
      if (activeField) activeField.focus();
      return;
    }
    if (key.classList.contains("np-blank")) return;
    if (!activeField) return;
    if (key.classList.contains("back")) { fieldBackspace(); activeField.focus(); return; }
    if (numSymbols) {
      var sym = key.getAttribute("data-sym");
      if (sym) fieldInsert(sym);
    } else {
      fieldInsert(key.getAttribute("data-k"));
    }
    activeField.focus();
  }
  numPad.addEventListener("mousedown", onNumPadPress);
  numPad.addEventListener("touchstart", onNumPadPress, { passive: false });

  function onAlphaPress(e) {
    var key = e.target.closest(".kb-key");
    if (!key) return;
    e.preventDefault();
    var k = key.getAttribute("data-k");
    if (k === "done") { hideBoards(); if (activeField) activeField.blur(); return; }
    if (!activeField) return;
    if (k === "shift") { setShift(!shiftOn); return; }
    if (k === "back") { fieldBackspace(); activeField.focus(); return; }
    fieldInsert(shiftOn ? k.toUpperCase() : k);
    if (shiftOn) setShift(false);   // auto-release shift after one letter
    activeField.focus();
  }
  alphaKb.addEventListener("mousedown", onAlphaPress);
  alphaKb.addEventListener("touchstart", onAlphaPress, { passive: false });

  deleteBtn.addEventListener("click", deleteOne);
  var delHold = null;
  deleteBtn.addEventListener("mousedown", function () {
    delHold = setTimeout(clearAll, 600);
  });
  ["mouseup", "mouseleave"].forEach(function (ev) {
    deleteBtn.addEventListener(ev, function () { clearTimeout(delHold); });
  });

  // Physical keyboard support
  document.addEventListener("keydown", function (e) {
    // Let form fields receive typing normally.
    if (e.target && e.target.tagName === "INPUT") {
      if (e.key === "Escape") closeContactForm();
      return;
    }
    if (inCall) {
      if (e.key === "Escape" || e.key === "Enter") endCall();
      else if (dtmf[e.key]) pressKey(e.key);
      return;
    }
    if (/^[0-9*#+]$/.test(e.key)) {
      if (e.key === "+") { if (number.length < 18) { number += "+"; render(); } }
      else pressKey(e.key);
    } else if (e.key === "Backspace") {
      e.preventDefault();
      deleteOne();
    } else if (e.key === "Enter") {
      startCall();
    } else if (e.key === "Escape") {
      clearAll();
    }
  });

  renderSimToggle();
  render();
})();
</script>
</body>
</html>
