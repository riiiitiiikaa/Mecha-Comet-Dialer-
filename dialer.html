<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=540, height=620, initial-scale=1.0">
<title>Dialer</title>
<style>
  :root {
    --bg: #000000;
    --key: #212121;
    --key-active: #333333;
    --accent: #1faa3f;       /* call green */
    --accent-active: #178534;
    --danger: #e74c3c;
    --blue: #2b8cff;
    --sim1: #f5c518;
    --sim2: #2f8fff;
    --text: #ffffff;
    --muted: #b8b8b8;
    --letters: #cfcfcf;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%;
    height: 100%;
    min-height: 100vh;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .device {
    width: 540px;
    height: 620px;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    border: 2px solid #2b2b2b;
    border-radius: 18px;
    overflow: hidden;
    position: relative;
  }

  /* ---------- Display ---------- */
  .display {
    flex: 1 1 auto;
    padding: 24px 28px 8px;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .contact-name {
    font-size: 15px;
    color: var(--accent);
    height: 20px;
    letter-spacing: 0.3px;
    margin-bottom: 4px;
  }
  .number {
    font-size: 46px;
    font-weight: 300;
    letter-spacing: 1px;
    line-height: 1.1;
    text-align: center;
    width: 100%;
    min-height: 50px;
    word-break: break-all;
    color: #d9d9d9;
  }
  .number.placeholder { color: #5a5a5a; }
  .sub-status {
    font-size: 13px;
    color: var(--muted);
    height: 18px;
    margin-top: 2px;
  }

  /* ---------- Keypad ---------- */
  .keypad {
    flex: 0 0 auto;
    height: 300px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-auto-rows: 1fr;
    gap: 12px;
    padding: 6px 16px 8px;
    align-content: center;
    overflow: hidden;
    transition: height .22s ease, padding .22s ease;
  }
  .key {
    background: var(--key);
    border: none;
    border-radius: 14px;
    width: 100%;
    height: 100%;
    color: var(--text);
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 7px;
    cursor: pointer;
    transition: background 0.12s, transform 0.05s;
  }
  .key:active { background: var(--key-active); transform: scale(0.97); }
  .key .digit { font-size: 30px; font-weight: 400; line-height: 1; }
  .key .letters {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--letters);
    font-weight: 600;
  }
  .key .plus { font-size: 16px; color: var(--letters); font-weight: 400; }
  .key .glyph { font-size: 30px; font-weight: 600; line-height: 1; }

  /* ---------- Keypad suggestions ---------- */
  .suggestions {
    flex: 0 0 auto;
    display: none;
    overflow-y: auto;
    padding: 0 8px 2px;
    min-height: 0;
  }
  .suggestions::-webkit-scrollbar { width: 6px; }
  .suggestions::-webkit-scrollbar-thumb { background: #2b2b2b; border-radius: 3px; }
  .dialer-suggesting .suggestions { display: block; flex: 1 1 auto; }

  /* Keypad keeps its size while suggesting; the display shrinks to make room. */
  .dialer-suggesting .keypad { flex: 0 0 auto; height: 300px; }
  .dialer-suggesting .display { flex: 0 0 auto; min-height: 0; padding-top: 8px; padding-bottom: 2px; }
  .dialer-suggesting .number { font-size: 30px !important; }
  .dialer-suggesting .contact-name,
  .dialer-suggesting .sub-status { display: none; }

  /* Minimized: keypad collapses into an elongated bar above the action row. */
  .dialer-suggesting.keypad-min .keypad { height: 0; padding-top: 0; padding-bottom: 0; }
  .keypad-bar {
    display: none;
    flex: 0 0 auto;
    height: 42px; margin: 0 16px 8px;
    border: none; border-radius: 12px;
    background: var(--key); color: var(--muted);
    cursor: pointer; align-items: center; justify-content: center;
    gap: 8px; font-family: inherit; font-size: 13px; font-weight: 600;
    transition: background .12s;
  }
  .keypad-bar:active { background: var(--key-active); }
  .keypad-bar svg { width: 20px; height: 20px; }
  .dialer-suggesting.keypad-min .keypad-bar { display: flex; }

  /* ---------- Search bar (recents / contacts) ---------- */
  .search-bar {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 14px;
    height: 40px;
    margin: 0 16px 12px;
    background: var(--key); border-radius: 8px;
    padding: 0 18px;
  }
  .search-bar .search-ic { width: 19px; height: 19px; color: var(--muted); flex: 0 0 auto; }
  .search-bar input {
    flex: 1 1 auto; min-width: 0; height: 100%;
    background: transparent; border: none; outline: none;
    color: var(--text); font-size: 16px; letter-spacing: .2px; font-family: inherit;
  }
  .search-bar input::placeholder { color: #6a6a6a; }

  /* ---------- Action row ---------- */
  .actions {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 0 16px 10px;
  }
  .action-btn {
    height: 62.5px;
    border: none;
    border-radius: 14px;
    background: var(--key);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s, transform 0.05s, visibility 0s;
  }
  .action-btn:active { transform: scale(0.97); }
  .action-btn svg { width: 30px; height: 30px; }

  .add-btn { color: var(--blue); }
  .add-btn:active { background: var(--key-active); }

  .call-btn { background: var(--accent); color: #fff; }
  .call-btn:active { background: var(--accent-active); }
  .call-btn.in-call { background: var(--danger); }
  .call-btn svg { width: 34px; height: 34px; }

  .delete-btn { color: var(--text); }
  .delete-btn:active { background: var(--key-active); }
  .delete-btn.hidden { visibility: hidden; }

  /* ---------- Bottom nav ---------- */
  .navbar {
    flex: 0 0 auto;
    height: 58px;
    border-top: 1px solid #1c1c1c;
  }
  .nav-tabs {
    height: 100%;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    align-items: center;
  }
  .nav-item {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    cursor: pointer;
  }
  .nav-item svg { width: 24px; height: 24px; }
  .nav-item.active { color: var(--text); }
  .nav-chip {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px 22px;
    border-radius: 12px;
    transition: background .12s;
  }
  .nav-item.active .nav-chip { background: var(--key); }

  /* editor mode: back + save */
  .nav-editor {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
  }
  .nav-ed-btn {
    width: 44px; height: 44px;
    border: none; background: transparent; color: var(--text);
    cursor: pointer; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-ed-btn:active { background: var(--key); }
  .nav-ed-btn svg { width: 24px; height: 24px; }
  #navSaveBtn { color: var(--accent); }
  .navbar.editing .nav-tabs { display: none; }
  .navbar:not(.editing) .nav-editor { display: none; }

  /* ---------- Views (keypad / recents) ---------- */
  .view { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; }
  .hidden-view { display: none; }

  .recents-header {
    flex: 0 0 auto;
    font-size: 24px;
    font-weight: 600;
    padding: 22px 22px 20px;
    display: flex;
    align-items: center;
    min-height: 78px;
  }
  .recents-header.list-head {
    justify-content: space-between;
  }
  .head-add-btn {
    width: 36px; height: 36px;
    border: none; border-radius: 50%;
    background: var(--key); color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .head-add-btn:active { background: var(--key-active); }
  .head-add-btn svg { width: 20px; height: 20px; }
  /* Search bar + list scroll together within this area. */
  .list-scroll {
    flex: 1 1 auto;
    overflow-y: auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  .list-scroll::-webkit-scrollbar { width: 6px; }
  .list-scroll::-webkit-scrollbar-thumb { background: #2b2b2b; border-radius: 3px; }
  .recents-list {
    flex: 0 0 auto;
    padding: 0 10px 12px;
  }
  .recents-empty {
    color: var(--muted);
    text-align: center;
    padding: 50px 20px;
    font-size: 15px;
  }
  .log-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 11px 12px;
    border-radius: 12px;
    cursor: pointer;
  }
  .log-row:active { background: var(--key); }
  .log-type {
    width: 20px; height: 20px; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
  }
  .log-type svg { width: 18px; height: 18px; }
  .log-type.missed { color: var(--danger); }
  .log-type.incoming { color: var(--blue); }
  .log-type.outgoing { color: var(--accent); }
  .contact-av {
    width: 38px; height: 38px; flex: 0 0 auto;
    border-radius: 8px;
    background: var(--key);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600; color: var(--text);
  }
  .log-info { flex: 1 1 auto; min-width: 0; }
  .log-name {
    font-size: 17px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .log-name.missed { color: var(--danger); }
  .log-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .log-call {
    flex: 0 0 auto;
    width: 40px; height: 40px;
    border: none; background: transparent;
    color: var(--accent); cursor: pointer;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .log-call:active { background: var(--key-active); }
  .log-call svg { width: 22px; height: 22px; }

  /* ---------- SIM selector bar ---------- */
  .sim-bar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    padding: 12px 16px 0;
  }
  .sim-toggle {
    display: flex; align-items: center; gap: 6px;
    height: 36px; padding: 0 14px;
    background: var(--key);
    border: 1px solid var(--sim1);
    border-radius: 10px;
    color: var(--sim1);
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    transition: background .12s;
  }
  .sim-toggle:active { background: var(--key-active); }
  .sim-info-btn {
    flex: 0 0 auto;
    width: 36px; height: 36px;
    border: none; background: var(--key);
    color: var(--muted); border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .sim-info-btn:active { background: var(--key-active); }
  .sim-info-btn svg { width: 20px; height: 20px; }

  /* signal bars */
  .sig { display: inline-flex; align-items: flex-end; gap: 2px; height: 14px; }
  .sig i { width: 3px; background: currentColor; border-radius: 1px; opacity: .28; }
  .sig i.on { opacity: 1; }
  .sig i:nth-child(1) { height: 5px; }
  .sig i:nth-child(2) { height: 8px; }
  .sig i:nth-child(3) { height: 11px; }
  .sig i:nth-child(4) { height: 14px; }

  /* in-call sim line */
  .call-sim {
    font-size: 13px; color: var(--muted);
    display: flex; align-items: center; gap: 7px; margin-top: 4px;
  }
  .call-sim .sim-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* recents sim tag */
  .log-sim {
    font-size: 10px; font-weight: 600;
    padding: 1px 6px; border-radius: 4px; margin-left: 5px;
    background: rgba(255,255,255,.06);
    border: 1px solid currentColor;
  }

  /* ---------- SIM information page ---------- */
  .sim-screen {
    position: absolute; top: 0; left: 0; right: 0; bottom: 58px;
    background: var(--bg);
    display: none; flex-direction: column;
    z-index: 20;
  }
  .sim-screen.active { display: flex; }
  .sim-top {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 10px;
    padding: 18px 16px 10px;
  }
  .sim-top .back-btn {
    border: none; background: transparent; color: var(--text);
    cursor: pointer; width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
  }
  .sim-top .back-btn:active { background: var(--key); }
  .sim-top .back-btn svg { width: 22px; height: 22px; }
  .sim-top h2 { font-size: 21px; font-weight: 600; }
  .sim-cards {
    flex: 1 1 auto; overflow-y: auto;
    padding: 4px 16px 16px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .sim-cards::-webkit-scrollbar { width: 6px; }
  .sim-cards::-webkit-scrollbar-thumb { background: #2b2b2b; border-radius: 3px; }
  .sim-card {
    background: var(--key); border-radius: 16px; padding: 16px;
    border-left: 3px solid var(--sim1);
  }
  .sim-card.s1 { border-left-color: var(--sim1); }
  .sim-card.s2 { border-left-color: var(--sim2); }
  .sim-card.off { opacity: .55; }
  .sim-card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .sim-card-title { display: flex; align-items: center; gap: 10px; }
  .sim-card-title .sim-dot { width: 11px; height: 11px; border-radius: 50%; }
  .sim-card-title .t { font-size: 17px; font-weight: 600; }
  .sim-card-title .c { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .sim-num { font-size: 20px; font-weight: 300; letter-spacing: .5px; margin: 2px 0 14px; color: #e6e6e6; }
  .sim-rows { display: flex; flex-direction: column; gap: 10px; }
  .sim-row { display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
  .sim-row .k { color: var(--muted); }
  .sim-row .v { display: flex; align-items: center; gap: 7px; color: var(--text); }
  .badge {
    font-size: 11px; font-weight: 600;
    padding: 2px 9px; border-radius: 20px;
    background: rgba(255,255,255,.08); color: var(--muted);
  }
  .badge.default { background: rgba(31,170,63,.18); color: var(--accent); }
  .badge.roam-on { background: rgba(255,140,66,.18); color: var(--sim2); }
  .sim-card-actions { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 16px; }
  .sim-toggle-wrap { display: flex; align-items: center; gap: 9px; font-size: 13px; color: var(--muted); }
  .set-default-btn {
    border: none; border-radius: 10px; padding: 8px 14px;
    font-size: 12px; font-weight: 600;
    background: rgba(255,255,255,.07); color: var(--text); cursor: pointer;
  }
  .set-default-btn:active { background: rgba(255,255,255,.16); }
  .set-default-btn:disabled { opacity: .4; cursor: default; }
  .switch { position: relative; width: 42px; height: 24px; flex: 0 0 auto; cursor: pointer; }
  .switch input { display: none; }
  .switch .track { position: absolute; inset: 0; background: #3a3a3a; border-radius: 20px; transition: .15s; }
  .switch .knob { position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: .15s; }
  .switch input:checked + .track { background: var(--accent); }
  .switch input:checked + .track + .knob { left: 20px; }

  /* ---------- New-contact form ---------- */
  .form-screen {
    position: absolute; top: 0; left: 0; right: 0; bottom: 58px;
    background: var(--bg);
    display: none; flex-direction: column;
    overflow: hidden;
    z-index: 25;
  }
  .form-screen.active { display: flex; }
  .form-body {
    flex: 1 1 auto; overflow-y: auto;
    padding: 6px 22px 20px;
    display: flex; flex-direction: column; gap: 18px;
    scroll-behavior: smooth;
  }
  .form-body.board-open { padding-bottom: 270px; }
  .form-body { scrollbar-width: thin; scrollbar-color: transparent transparent; }
  .form-body.scrolling { scrollbar-color: #2b2b2b transparent; }
  .form-body::-webkit-scrollbar { width: 5px; }
  .form-body::-webkit-scrollbar-track { background: transparent; }
  .form-body::-webkit-scrollbar-thumb { background: transparent; border-radius: 3px; transition: background .3s; }
  .form-body.scrolling::-webkit-scrollbar-thumb { background: #2b2b2b; }
  .form-av {
    flex: 0 0 auto;
    width: 84px; height: 84px; border-radius: 8px;
    background: var(--key);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 600; color: var(--text);
    margin: 6px auto 2px;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; color: var(--muted); padding-left: 2px; }
  .field input {
    background: var(--key);
    border: 1px solid transparent;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 17px; color: var(--text);
    outline: none; font-family: inherit;
  }
  .field input:focus { border-color: #3a4761; }
  .field input::placeholder { color: #5a5a5a; }
  .form-err { color: var(--danger); font-size: 13px; min-height: 16px; text-align: center; }

  /* multiple number rows */
  .num-row { display: flex; align-items: center; gap: 12px; }
  .num-row + .num-row { margin-top: 10px; }
  .num-input {
    flex: 1 1 auto; min-width: 0;
    background: var(--key); border: 1px solid transparent; border-radius: 12px;
    padding: 14px 16px; font-size: 16px; color: var(--text);
    outline: none; font-family: inherit;
  }
  .num-input:focus { border-color: #3a4761; }
  .num-input::placeholder { color: #5a5a5a; }
  .num-act {
    width: 30px; height: 30px; flex: 0 0 auto;
    border-radius: 50%; border: 1.5px solid currentColor;
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .12s;
  }
  .num-act svg { width: 18px; height: 18px; }
  .num-act.remove { color: var(--danger); }
  .num-act.remove:active { background: rgba(231,76,60,.16); }
  .num-act.add { color: var(--blue); }
  .num-act.add:active { background: rgba(43,140,255,.16); }
  .num-count {
    margin-left: 8px; font-size: 11px; font-weight: 600;
    color: var(--muted); background: rgba(255,255,255,.06);
    padding: 1px 6px; border-radius: 8px;
  }

  .edit-actions { margin-top: auto; display: flex; gap: 10px; }
  .edit-action-btn {
    flex: 1;
    border: none; border-radius: 14px; padding: 15px;
    font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .edit-action-btn.delete { background: rgba(231,76,60,.14); color: var(--danger); }
  .edit-action-btn.delete:active { background: rgba(231,76,60,.26); }
  .edit-action-btn.block { background: rgba(245,166,35,.14); color: #f5a623; }
  .edit-action-btn.block:active { background: rgba(245,166,35,.28); }
  .edit-action-btn.block.on { background: rgba(245,166,35,.3); }
  .blocked-tag {
    margin-left: 8px; font-size: 10px; font-weight: 700;
    color: #f5a623; background: rgba(245,166,35,.16);
    padding: 1px 6px; border-radius: 8px;
  }

  /* On-screen numeric keypad (contact editor) */
  .num-pad {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: #141414;
    border-top: 1px solid #262626;
    padding: 6px 12px 12px;
    transform: translateY(115%);
    transition: transform .2s ease;
    z-index: 5;
  }
  .num-pad.show { transform: translateY(0); }
  .np-done {
    background: transparent; border: none; color: var(--blue);
    font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
    padding: 4px 8px;
  }
  .np-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .np-key {
    height: 46px; border: none; border-radius: 10px;
    background: var(--key); color: var(--text);
    font-size: 23px; font-weight: 500; cursor: pointer; font-family: inherit;
    display: flex; align-items: center; justify-content: center;
    transition: background .1s;
  }
  .np-key:active { background: var(--key-active); }
  .np-key.back { color: var(--muted); }
  .np-key.back svg { width: 24px; height: 24px; }
  .np-toggle { font-size: 19px; letter-spacing: 1px; color: var(--muted); }
  .np-key.np-blank { background: #191919; color: transparent; cursor: default; }
  .np-key.np-blank:active { background: #191919; }

  /* On-screen alphabetical keyboard (contact editor) */
  .alpha-kb {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: #141414;
    border-top: 1px solid #262626;
    padding: 6px 6px 12px;
    transform: translateY(115%);
    transition: transform .2s ease;
    z-index: 5;
  }
  .alpha-kb.show { transform: translateY(0); }
  .kb-rows { display: flex; flex-direction: column; gap: 7px; }
  .kb-row { display: flex; gap: 6px; justify-content: center; }
  .kb-key {
    flex: 1 1 0; min-width: 0; height: 44px;
    border: none; border-radius: 8px;
    background: var(--key); color: var(--text);
    font-size: 17px; font-weight: 500; cursor: pointer; font-family: inherit;
    display: flex; align-items: center; justify-content: center;
    transition: background .1s;
  }
  .kb-key:active { background: var(--key-active); }
  .kb-key.util { background: #2a2a2a; color: var(--muted); }
  .kb-key.wide { flex: 1.5 1 0; }
  .kb-key.space { flex: 6 1 0; font-size: 14px; color: var(--muted); }
  .kb-key.done { flex: 2.2 1 0; color: var(--blue); font-weight: 600; font-size: 15px; }
  .kb-key svg { width: 20px; height: 20px; }
  .kb-key.shift.on { color: var(--blue); background: rgba(43,140,255,.14); }

  /* ---------- Bottom sheet (number / SIM picker) ---------- */
  .sheet-backdrop {
    position: absolute; inset: 0;
    background: rgba(0,0,0,.55);
    display: none; z-index: 40;
    align-items: flex-end;
  }
  .sheet-backdrop.active { display: flex; }
  .sheet {
    width: 100%;
    background: #1a1a1a;
    border-top-left-radius: 18px; border-top-right-radius: 18px;
    padding: 8px 14px 18px;
    animation: sheetUp .2s ease;
  }
  @keyframes sheetUp { from { transform: translateY(24px); opacity: .6; } to { transform: translateY(0); opacity: 1; } }
  .sheet-grip { width: 38px; height: 4px; border-radius: 2px; background: #3a3a3a; margin: 6px auto 4px; }
  .sheet-title { text-align: center; font-size: 14px; color: var(--muted); padding: 8px 8px 12px; }
  .sheet-list { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; }
  .sheet-list::-webkit-scrollbar { width: 6px; }
  .sheet-list::-webkit-scrollbar-thumb { background: #2b2b2b; border-radius: 3px; }
  .sheet-item {
    display: flex; align-items: center; gap: 14px;
    background: var(--key); border: none; border-radius: 10px;
    padding: 15px 16px; cursor: pointer; color: var(--text);
    font-size: 16px; font-family: inherit; text-align: left; width: 100%;
  }
  .sheet-item:active { background: var(--key-active); }
  .sheet-item .s-main { flex: 1 1 auto; min-width: 0; }
  .sheet-item .s-sub { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .sheet-item .sim-dot { width: 11px; height: 11px; border-radius: 50%; flex: 0 0 auto; }
  .sheet-item .s-icon { width: 20px; height: 20px; color: var(--accent); flex: 0 0 auto; }
  .sheet-item .s-icon svg { width: 20px; height: 20px; }
  .sheet-item .s-tag {
    font-size: 10px; font-weight: 600; color: var(--accent);
    background: rgba(31,170,63,.16); padding: 2px 8px; border-radius: 20px; flex: 0 0 auto;
  }
  .sheet-cancel {
    margin-top: 10px; width: 100%;
    background: var(--key); border: none; border-radius: 10px;
    padding: 15px; color: var(--text); font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .sheet-cancel:active { background: var(--key-active); }

  /* ---------- In-call overlay ---------- */
  .call-screen {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #0e2a1c 0%, #000000 70%);
    display: none;
    flex-direction: column;
    align-items: center;
    padding-top: 70px;
    z-index: 10;
  }
  .call-screen.active { display: flex; }
  .call-avatar {
    width: 108px;
    height: 108px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2ecc71, #1f8f4e);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 22px;
  }
  .call-name { font-size: 30px; margin-bottom: 8px; }
  .call-number-sm { font-size: 16px; color: var(--muted); margin-bottom: 6px; }
  .call-timer { font-size: 18px; color: var(--accent); letter-spacing: 1px; }
  .end-btn {
    margin-top: auto;
    margin-bottom: 50px;
    width: 160px;
    height: 70px;
    border-radius: 14px;
    border: none;
    background: var(--danger);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 18px rgba(231, 76, 60, 0.4);
    transition: transform 0.05s, background 0.12s;
  }
  .end-btn:active { transform: scale(0.94); }
  .end-btn svg { width: 34px; height: 34px; }
</style>
</head>
<body>
<div class="device">

  <div class="view" id="dialerView">
  <div class="sim-bar">
    <button class="sim-toggle" id="simToggle" title="Switch SIM" aria-label="Switch SIM">S1</button>
    <button class="sim-info-btn" id="simInfoBtn" title="SIM information" aria-label="SIM information">

        <circle cx="12" cy="12" r="9"></circle>
        <line x1="12" y1="11" x2="12" y2="16"></line>
        <circle cx="12" cy="8" r="0.6" fill="currentColor" stroke="none"></circle>
      </svg>
    </button>
  </div>
  <div class="display">
    <div class="contact-name" id="contactName"></div>
    <div class="number placeholder" id="number">Enter a number</div>
    <div class="sub-status" id="subStatus"></div>
  </div>

  <div class="suggestions" id="suggestions"></div>

  <div class="keypad" id="keypad">
    <button class="key" data-key="1"><span class="digit">1</span></button>
    <button class="key" data-key="2"><span class="digit">2</span><span class="letters">ABC</span></button>
    <button class="key" data-key="3"><span class="digit">3</span><span class="letters">DEF</span></button>
    <button class="key" data-key="4"><span class="digit">4</span><span class="letters">GHI</span></button>
    <button class="key" data-key="5"><span class="digit">5</span><span class="letters">JKL</span></button>
    <button class="key" data-key="6"><span class="digit">6</span><span class="letters">MNO</span></button>
    <button class="key" data-key="7"><span class="digit">7</span><span class="letters">PQRS</span></button>
    <button class="key" data-key="8"><span class="digit">8</span><span class="letters">TUV</span></button>
    <button class="key" data-key="9"><span class="digit">9</span><span class="letters">WXYZ</span></button>
    <button class="key" data-key="*"><span class="glyph">&#42;</span></button>
    <button class="key" data-key="0"><span class="plus">+</span><span class="digit">0</span></button>
    <button class="key" data-key="#"><span class="glyph">&#35;</span></button>
  </div>

  <button class="keypad-bar" id="keypadBar" aria-label="Show keypad" title="Show keypad">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 13 12 8 17 13"></polyline></svg>
    <svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px;">
      <circle cx="6" cy="6" r="1.5"></circle><circle cx="12" cy="6" r="1.5"></circle><circle cx="18" cy="6" r="1.5"></circle>
      <circle cx="6" cy="12" r="1.5"></circle><circle cx="12" cy="12" r="1.5"></circle><circle cx="18" cy="12" r="1.5"></circle>
      <circle cx="6" cy="18" r="1.5"></circle><circle cx="12" cy="18" r="1.5"></circle><circle cx="18" cy="18" r="1.5"></circle>
    </svg>
  </button>

  <div class="actions">
    <button class="action-btn add-btn" id="addBtn" title="Add contact" aria-label="Add contact">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="8" r="3.2"></circle>
        <path d="M3.5 19c0-3 2.5-5 5.5-5s5.5 2 5.5 5"></path>
        <line x1="19" y1="8" x2="19" y2="14"></line>
        <line x1="16" y1="11" x2="22" y2="11"></line>
      </svg>
    </button>

    <button class="action-btn call-btn" id="callBtn" title="Call" aria-label="Call">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.2 1l-2.3 2.2z"></path>
      </svg>
    </button>

    <button class="action-btn delete-btn hidden" id="deleteBtn" title="Delete" aria-label="Delete">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 5H9L3 12l6 7h12a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1z"></path>
        <line x1="17" y1="9.5" x2="12" y2="14.5"></line>
        <line x1="12" y1="9.5" x2="17" y2="14.5"></line>
      </svg>
    </button>
  </div>
  </div><!-- /dialerView -->

  <div class="view hidden-view" id="recentsView">
    <div class="recents-header">Call log</div>
    <div class="list-scroll">
      <div class="search-bar">
        <svg class="search-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.2" y2="16.2"></line></svg>
        <input id="recentsSearch" type="text" placeholder="Search name or number" autocomplete="off">
      </div>
      <div class="recents-list" id="recentsList"></div>
    </div>
  </div>

  <div class="view hidden-view" id="contactsView">
    <div class="recents-header list-head">
      <span>Contacts</span>
      <button class="head-add-btn" id="addContactBtn" title="New contact" aria-label="New contact">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </div>
    <div class="list-scroll">
      <div class="search-bar">
        <svg class="search-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.2" y2="16.2"></line></svg>
        <input id="contactsSearch" type="text" placeholder="Search name or number" autocomplete="off">
      </div>
      <div class="recents-list" id="contactsList"></div>
    </div>
  </div>

  <div class="navbar" id="navbar">
    <div class="nav-tabs" id="navTabs">
      <div class="nav-item" id="navRecents" title="Recents">
        <span class="nav-chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"></circle>
            <polyline points="12 7 12 12 16 14"></polyline>
          </svg>
        </span>
      </div>
      <div class="nav-item active" id="navKeypad" title="Keypad">
        <span class="nav-chip">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <circle cx="6" cy="6" r="1.6"></circle><circle cx="12" cy="6" r="1.6"></circle><circle cx="18" cy="6" r="1.6"></circle>
            <circle cx="6" cy="12" r="1.6"></circle><circle cx="12" cy="12" r="1.6"></circle><circle cx="18" cy="12" r="1.6"></circle>
            <circle cx="6" cy="18" r="1.6"></circle><circle cx="12" cy="18" r="1.6"></circle><circle cx="18" cy="18" r="1.6"></circle>
          </svg>
        </span>
      </div>
      <div class="nav-item" id="navContacts" title="Contacts">
        <span class="nav-chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="16" rx="2"></rect>
            <circle cx="9" cy="11" r="2.2"></circle>
            <path d="M5.5 17c.4-1.8 2-3 3.5-3s3.1 1.2 3.5 3"></path>
            <line x1="15" y1="9" x2="18" y2="9"></line>
            <line x1="15" y1="13" x2="18" y2="13"></line>
          </svg>
        </span>
      </div>
    </div>
    <div class="nav-editor" id="navEditor">
      <button class="nav-ed-btn" id="navBackBtn" title="Back" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 5 8 12 15 19"></polyline>
        </svg>
      </button>
      <button class="nav-ed-btn" id="navSaveBtn" title="Save" aria-label="Save">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 12 10 18 20 6"></polyline>
        </svg>
      </button>
    </div>
  </div>

  <!-- Number / SIM picker sheet -->
  <div class="sheet-backdrop" id="sheetBackdrop">
    <div class="sheet" id="sheet">
      <div class="sheet-grip"></div>
      <div class="sheet-title" id="sheetTitle"></div>
      <div class="sheet-list" id="sheetList"></div>
      <button class="sheet-cancel" id="sheetCancel">Cancel</button>
    </div>
  </div>

  <!-- In-call screen -->
  <div class="call-screen" id="callScreen">
    <div class="call-avatar" id="callAvatar">#</div>
    <div class="call-name" id="callName">Unknown</div>
    <div class="call-number-sm" id="callNumberSm"></div>
    <div class="call-sim" id="callSim"></div>
    <div class="call-timer" id="callTimer">Calling…</div>
    <button class="end-btn" id="endBtn" title="End call" aria-label="End call">
      <svg viewBox="0 0 24 24" fill="currentColor" style="transform: rotate(135deg);">
        <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.2 1l-2.3 2.2z"></path>
      </svg>
    </button>
  </div>

  <!-- SIM information page -->
  <div class="sim-screen" id="simScreen">
    <div class="sim-top">
      <button class="back-btn" id="simBackBtn" title="Back" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 5 8 12 15 19"></polyline>
        </svg>
      </button>
      <h2>SIM Information</h2>
    </div>
    <div class="sim-cards" id="simCards"></div>
  </div>

  <!-- New / edit contact form -->
  <div class="form-screen" id="contactForm">
    <div class="sim-top">
      <h2 id="contactFormTitle">New Contact</h2>
    </div>
    <div class="form-body">
      <div class="form-av" id="formAv">?</div>
      <div class="field">
        <label for="cName">Name</label>
        <input id="cName" type="text" placeholder="Contact name" autocomplete="off" maxlength="40">
      </div>
      <div class="field">
        <label>Phone numbers</label>
        <div id="numbersWrap"></div>
      </div>
      <div class="field">
        <label for="cEmail">Email</label>
        <input id="cEmail" type="email" placeholder="Email address" autocomplete="off" maxlength="60">
      </div>
      <div class="form-err" id="formErr"></div>
      <div class="edit-actions" id="editActions">
        <button type="button" class="edit-action-btn block" id="contactBlockBtn">Block</button>
        <button type="button" class="edit-action-btn delete" id="contactDeleteBtn">Delete</button>
      </div>
    </div>

    <!-- On-screen numeric keypad for the number fields -->
    <div class="num-pad" id="numPad">
      <div class="np-grid">
        <button type="button" class="np-key" data-k="1" data-sym="+">1</button>
        <button type="button" class="np-key" data-k="2" data-sym="*">2</button>
        <button type="button" class="np-key" data-k="3" data-sym="#">3</button>
        <button type="button" class="np-key" data-k="4">4</button>
        <button type="button" class="np-key" data-k="5">5</button>
        <button type="button" class="np-key" data-k="6">6</button>
        <button type="button" class="np-key" data-k="7">7</button>
        <button type="button" class="np-key" data-k="8">8</button>
        <button type="button" class="np-key" data-k="9">9</button>
        <button type="button" class="np-key np-toggle" id="npToggle">+*#</button>
        <button type="button" class="np-key" data-k="0">0</button>
        <button type="button" class="np-key back" data-k="back" aria-label="Backspace">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 5H9L3 12l6 7h12a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1z"></path>
            <line x1="17" y1="9.5" x2="12" y2="14.5"></line>
            <line x1="12" y1="9.5" x2="17" y2="14.5"></line>
          </svg>
        </button>
      </div>
    </div>

    <!-- On-screen alphabetical keyboard for the name field -->
    <div class="alpha-kb" id="alphaKb">
      <div class="kb-rows">
        <div class="kb-row">
          <button type="button" class="kb-key" data-k="q">q</button>
          <button type="button" class="kb-key" data-k="w">w</button>
          <button type="button" class="kb-key" data-k="e">e</button>
          <button type="button" class="kb-key" data-k="r">r</button>
          <button type="button" class="kb-key" data-k="t">t</button>
          <button type="button" class="kb-key" data-k="y">y</button>
          <button type="button" class="kb-key" data-k="u">u</button>
          <button type="button" class="kb-key" data-k="i">i</button>
          <button type="button" class="kb-key" data-k="o">o</button>
          <button type="button" class="kb-key" data-k="p">p</button>
        </div>
        <div class="kb-row">
          <button type="button" class="kb-key" data-k="a">a</button>
          <button type="button" class="kb-key" data-k="s">s</button>
          <button type="button" class="kb-key" data-k="d">d</button>
          <button type="button" class="kb-key" data-k="f">f</button>
          <button type="button" class="kb-key" data-k="g">g</button>
          <button type="button" class="kb-key" data-k="h">h</button>
          <button type="button" class="kb-key" data-k="j">j</button>
          <button type="button" class="kb-key" data-k="k">k</button>
          <button type="button" class="kb-key" data-k="l">l</button>
        </div>
        <div class="kb-row">
          <button type="button" class="kb-key util wide shift" data-k="shift" aria-label="Shift">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4l7 8h-4v6H9v-6H5z"></path></svg>
          </button>
          <button type="button" class="kb-key" data-k="z">z</button>
          <button type="button" class="kb-key" data-k="x">x</button>
          <button type="button" class="kb-key" data-k="c">c</button>
          <button type="button" class="kb-key" data-k="v">v</button>
          <button type="button" class="kb-key" data-k="b">b</button>
          <button type="button" class="kb-key" data-k="n">n</button>
          <button type="button" class="kb-key" data-k="m">m</button>
          <button type="button" class="kb-key util wide" data-k="back" aria-label="Backspace">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 5H9L3 12l6 7h12a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1z"></path>
              <line x1="17" y1="9.5" x2="12" y2="14.5"></line>
              <line x1="12" y1="9.5" x2="17" y2="14.5"></line>
            </svg>
          </button>
        </div>
        <div class="kb-row">
          <button type="button" class="kb-key" data-k="@">@</button>
          <button type="button" class="kb-key space" data-k=" ">space</button>
          <button type="button" class="kb-key" data-k=".">.</button>
          <button type="button" class="kb-key done wide" id="alphaDone" data-k="done">Done</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
(function () {
  "use strict";

  var number = "";
  var inCall = false;
  var callConnected = false;
  var timerInterval = null;
  var connectTimeout = null;
  var seconds = 0;

  var numberEl = document.getElementById("number");
  var contactNameEl = document.getElementById("contactName");
  var subStatusEl = document.getElementById("subStatus");

  var keypad = document.getElementById("keypad");

  var keypadBar = document.getElementById("keypadBar");

  var dialerView = document.getElementById("dialerView");
  var recentsView = document.getElementById("recentsView");
